# Configuração Nginx para Entrega Pra Mim
# Copie para: /etc/nginx/sites-available/entrega-pra-mim

server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Redirecionar HTTP para HTTPS (descomentar após configurar SSL)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Arquivos estáticos
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable";
    }

    # Uploads de comprovantes
    location /uploads {
        alias /home/entrega/entrega_pra_mim/public/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Logs
    access_log /var/log/nginx/entrega-pra-mim.access.log;
    error_log /var/log/nginx/entrega-pra-mim.error.log;

    # Tamanho máximo de upload (para fotos de comprovante)
    client_max_body_size 10M;
}


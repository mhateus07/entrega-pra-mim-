<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C17F59"/>
      <stop offset="100%" style="stop-color:#D4956A"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A4D68"/>
      <stop offset="100%" style="stop-color:#083D54"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Geometric blue shapes (depth) -->
  <polygon points="80,150 180,100 200,200 100,220" fill="#074058" opacity="0.6"/>
  <polygon points="350,80 450,120 420,220 340,180" fill="#074058" opacity="0.4"/>

  <!-- Speed lines (copper/bronze) -->
  <line x1="100" y1="260" x2="50" y2="260" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="290" x2="30" y2="290" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="95" y1="320" x2="45" y2="320" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- Laptop/Package icon -->
  <g transform="translate(95, 140)">
    <rect x="0" y="10" width="70" height="55" rx="6" fill="#FFFFFF"/>
    <rect x="6" y="16" width="58" height="40" rx="3" fill="#0A4D68"/>
    <rect x="15" y="65" width="40" height="6" rx="2" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Motorcycle body (white, stylized) -->
  <g transform="translate(140, 180)">
    <!-- Main body shape -->
    <path d="M80 120 Q140 40 250 80 L230 130 Q180 110 100 140 Z" fill="#FFFFFF"/>

    <!-- Handlebar -->
    <path d="M220 60 Q245 40 270 50" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Seat -->
    <ellipse cx="130" cy="95" rx="35" ry="12" fill="#FFFFFF"/>

    <!-- Rear wheel -->
    <circle cx="90" cy="165" r="42" fill="none" stroke="#FFFFFF" stroke-width="14"/>
    <circle cx="90" cy="165" r="16" fill="#FFFFFF"/>

    <!-- Front wheel -->
    <circle cx="240" cy="165" r="42" fill="none" stroke="#FFFFFF" stroke-width="14"/>
    <circle cx="240" cy="165" r="16" fill="#FFFFFF"/>

    <!-- Engine block -->
    <rect x="110" y="120" width="50" height="35" rx="5" fill="#FFFFFF"/>
  </g>

  <!-- Arrow accent (copper/bronze) pointing right -->
  <g transform="translate(380, 200)">
    <path d="M0 60 L60 0 L60 35 L100 35 L100 85 L60 85 L60 120 Z" fill="url(#accentGrad)"/>
  </g>
</svg>